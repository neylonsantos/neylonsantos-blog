---
layout: blog
---
<article class="post-article">
  <a href="/" class="post-back">&lt; voltar_para_lista</a>

  <header class="post-header">
    <h1 class="post-title color-{{ page.color }}">
      {{ page.icon }} {{ page.title }}
    </h1>
    <div class="post-meta">
      <span>// Data: {{ page.date | date: "%A, %d de %B de %Y" }}</span>
      <span>// Categoria: {{ page.category }}</span>
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-end">
    [ fim do arquivo ]
  </footer>
</article>
